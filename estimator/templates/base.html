{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construction AI Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="d-flex flex-column min-vh-100 position-relative" style="background-color: var(--bg-base); font-family: 'Outfit', sans-serif; overflow: hidden;">
    <!-- Original glowing space backgrounds -->
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Top Navbar exactly like the wireframe but Dark Glassmorphism -->
    <header class="top-header glass d-flex justify-content-between align-items-center px-4" style="height: 70px; border-bottom: 1px solid var(--glass-border); border-left: none; border-right: none; border-top: none; z-index: 1000; position: sticky; top: 0;">
        <div class="site-name fw-bold fs-4 text-white d-flex align-items-center gap-2">
            <div class="bg-primary bg-opacity-25 p-2 rounded text-primary" style="backdrop-filter: blur(5px);">
                <i class="fa-solid fa-layer-group"></i>
            </div>
            Construct<span class="gradient-text">AI</span>
        </div>
        <div class="profile-section">
            <a href="{% url 'profile' %}" class="d-flex align-items-center gap-2 text-decoration-none text-white fw-medium hover-text-primary">
                <i class="fa-solid fa-circle-user fs-3 text-secondary"></i>
                <span class="tracking-wider text-uppercase small">Profile</span>
            </a>
        </div>
    </header>

    <div class="d-flex" style="height: calc(100vh - 70px);">
        <!-- Left Sidebar (Menu) exactly like the wireframe but Dark Glassmorphism -->
        <aside class="sidebar glass" style="width: 80px; display: flex; flex-direction: column; align-items: center; padding-top: 2rem; border-right: 1px solid var(--glass-border) !important; border-top: none; border-bottom: none; border-left: none;">

            <a href="{% url 'home' %}" class="btn btn-primary rounded-circle mb-3 shadow" style="width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;">
                <i class="fa-solid fa-calculator fs-5 text-white"></i>
            </a>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-grow-1 p-4 overflow-auto position-relative z-1">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
